name: Render Keep-Alive

# Render 무료 웹 서비스는 15분간 인바운드 요청이 없으면 스핀다운된다.
# 10분 간격으로 /health 엔드포인트에 요청을 보내 서버를 깨워둔다.
#
# 주의: 24시간 상시 가동 시 한 달 약 730시간으로, Render 무료 플랜의
# 월 750시간 제한에 근접한다. 월말에 실행 시간을 모니터링할 것.

on:
  schedule:
    # 10분마다 실행 (UTC 기준이지만 간격이라 시간대 무관)
    # GitHub Actions 크론은 지연이 잦아 15분 스핀다운 대비 여유를 둔다.
    - cron: '5-59/10 * * * *'
  # Actions 탭에서 수동 실행도 가능하게 함 (테스트용)
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health endpoint
        run: |
          echo "Pinging server at $(date -u) UTC"

          # 실제 응답 코드를 받아오고, 실패 시 워크플로우도 실패 처리
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 60 \
            --retry 2 \
            --retry-delay 10 \
            https://quiz-api-jpp7.onrender.com/healthz)

          echo "Response code: $HTTP_CODE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Health check failed with code $HTTP_CODE"
            exit 1
          fi

          echo "Server is awake."
